# prek configuration — https://github.com/j178/prek
#
# prek is a Rust reimplementation of pre-commit and reads the same hook
# definitions. We declare our hooks here; run `prek install` to wire them
# into git, and `prek run --all-files` to lint the whole repo.

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
id = "check-json"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "trailing-whitespace"

[[repos.hooks]]
id = "mixed-line-ending"

[[repos]]
repo = "https://github.com/igorshubovych/markdownlint-cli"
rev = "v0.42.0"

[[repos.hooks]]
id = "markdownlint"
args = ["--config", ".markdownlint.json"]

# Validate SKILL.md against the Agent Skills spec using the official
# reference library: https://github.com/agentskills/agentskills/tree/main/skills-ref
[[repos]]
repo = "local"

[[repos.hooks]]
id = "validate-skill-md"
name = "Validate SKILL.md (skills-ref)"
entry = "skills-ref validate"
language = "python"
additional_dependencies = ["skills-ref @ git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref"]
files = "^skills/[^/]+/SKILL\\.md$"

[[repos.hooks]]
id = "guard-nfcore-modules"
name = "Block direct edits to modules/nf-core"
entry = "scripts/prek-hooks/guard-nfcore-modules.sh"
language = "system"
files = "(^|/)modules/nf-core/"
pass_filenames = true

[[repos.hooks]]
id = "lint-schema"
name = "Lint nextflow schema"
entry = "scripts/prek-hooks/lint-schema.sh"
language = "system"
files = "(^|/)nextflow_schema\\.json$"
pass_filenames = true

[[repos.hooks]]
id = "check-param-drift"
name = "Check config/schema param drift"
entry = "scripts/prek-hooks/check-param-drift.sh"
language = "system"
files = "(^|/)nextflow\\.config$"
pass_filenames = true

[[repos.hooks]]
id = "lint-local-module"
name = "Lint nf-core local modules"
entry = "scripts/prek-hooks/lint-local-module.sh"
language = "system"
files = "(^|/)modules/local/"
pass_filenames = true

[[repos.hooks]]
id = "check-nftest-exists"
name = "Require nf-test for local nf files"
entry = "scripts/prek-hooks/check-nftest-exists.sh"
language = "system"
files = "(^|/)(modules/local|subworkflows/local|workflows)/.*\\.nf$"
pass_filenames = true

[[repos.hooks]]
id = "check-changelog"
name = "Require CHANGELOG for user-visible changes"
entry = "scripts/prek-hooks/check-changelog.sh"
language = "system"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "check-claude-hooks-schema"
name = "Validate Claude Code hooks schema"
entry = "scripts/prek-hooks/check-claude-hooks-schema.sh"
language = "system"
files = "(^|/)\\.claude/settings\\.json$"
pass_filenames = true
